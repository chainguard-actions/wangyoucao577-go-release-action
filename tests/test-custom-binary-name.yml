name: Test custom binary name (linux/arm64, no upload)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REPOSITORY: testowner/testrepo
      GITHUB_EVENT_NAME: workflow_dispatch
      GITHUB_REF: refs/tags/v1.0.0
      GITHUB_SERVER_URL: https://github.com
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Create a minimal Go project inside GITHUB_WORKSPACE so it's accessible in the Docker container
      - name: Create minimal Go project
        run: |
          mkdir -p "$GITHUB_WORKSPACE/go-arm-project"
          cat > "$GITHUB_WORKSPACE/go-arm-project/main.go" << 'EOF'
          package main

          import "fmt"

          func main() {
            fmt.Println("Hello from ARM!")
          }
          EOF
          cat > "$GITHUB_WORKSPACE/go-arm-project/go.mod" << 'EOF'
          module example.com/helloarm

          go 1.21
          EOF

      - id: action
        uses: .
        with:
          github_token: 'dummy-token'
          goos: linux
          goarch: arm64
          binary_name: 'myapp'
          project_path: ${{ github.workspace }}/go-arm-project
          upload: 'FALSE'
          compress_assets: 'FALSE'
          md5sum: 'FALSE'
          sha256sum: 'FALSE'

      - name: Assert release_asset_dir output is set
        env:
          ASSET_DIR: ${{ steps.action.outputs.release_asset_dir }}
        run: |
          echo "release_asset_dir: $ASSET_DIR"
          if [ -z "$ASSET_DIR" ]; then
            echo "FAIL: release_asset_dir output is empty"
            exit 1
          fi
          echo "PASS: release_asset_dir=$ASSET_DIR"

      - name: Assert binary named myapp exists in asset dir
        env:
          ASSET_DIR: ${{ steps.action.outputs.release_asset_dir }}
        run: |
          echo "Checking for myapp binary in: $ASSET_DIR"
          ls -la "$ASSET_DIR" || true
          # Look for a file containing 'myapp' in the asset dir
          if ! find "$ASSET_DIR" -name '*myapp*' | grep -q .; then
            echo "FAIL: no file containing 'myapp' found in $ASSET_DIR"
            exit 1
          fi
          echo "PASS: found myapp artifact"
          find "$ASSET_DIR" -name '*myapp*'
